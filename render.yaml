services:
  # AI Service (Python FastAPI)
  - type: web
    name: resume-parser-ai-service
    env: python
    region: oregon
    plan: free
    buildCommand: |
      cd ai-service
      pip install -r requirements.txt
    startCommand: |
      cd ai-service
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000

  # Backend (Node.js Express)
  - type: web
    name: resume-parser-backend
    env: node
    region: oregon
    plan: free
    buildCommand: |
      cd backend/src
      npm install
      npm run build
    startCommand: |
      cd backend/src
      npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        value: https://resume-parser-ai-service.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://your-app.vercel.app

  # PostgreSQL Database
  - type: pserv
    name: resume-parser-db
    env: docker
    plan: free
    region: oregon
